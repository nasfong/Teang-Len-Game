# Static hosting for the Teang Len SPA. Copied to /etc/nginx/conf.d/default.conf.
server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text-y assets (nginx serves pre-nothing; keep it simple + effective).
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/css application/javascript application/json
                      image/svg+xml application/manifest+json;

    # Vite fingerprints everything under /assets/ (content hash in the filename),
    # so it can be cached forever — a new deploy ships new filenames.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # The PWA manifest — correct type, and don't cache it hard so display/orientation
    # changes are picked up on the next visit.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header   Cache-Control "no-cache";
    }

    # The HTML shell must never be cached, or clients keep loading an old bundle
    # that references deleted asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — client-side routing (react-router) owns every path, so any
    # unknown URL serves the shell instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
